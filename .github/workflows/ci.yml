name: CI

on:
  pull_request:

jobs:
  path-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            acceptance:
              - '**/tests/acceptance/**'
      # Acceptance-тесты разрешено вносить ТОЛЬКО на ветках PM (*_test)
      # Любая другая head-ветка (например, имплементера) с acceptance в diff → блок (test_boundary).
      - name: Fail if acceptance tests are modified outside a PM branch
        if: steps.filter.outputs.acceptance == 'true' && !endsWith(github.head_ref, '_test')
        run: |
          echo "PR modifies acceptance tests from a non-PM branch (head=${{ github.head_ref }})."
          echo "Acceptance tests may only be authored on *_test branches by the PM."
          exit 1

  checks-and-tests:
    runs-on: ubuntu-latest
    needs: path-guard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and Typecheck
        run: npm run build

      - name: Test
        run: npm run test
