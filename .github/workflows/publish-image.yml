name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and Typecheck
        run: npm run build

      - name: Test
        run: npm run test -- --run

  publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/rabbit-detector" >> "$GITHUB_OUTPUT"

      - name: Set tags
        id: tags
        run: |
          TAGS="${{ steps.image.outputs.name }}:sha-${GITHUB_SHA},${{ steps.image.outputs.name }}:latest"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  deploy-vps:
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref_name == 'main' && secrets.VPS_HOST != '' && secrets.VPS_USER != '' && secrets.VPS_SSH_KEY != ''
    env:
      APP_HOST_PORT: ${{ vars.APP_HOST_PORT }}
      APP_HTPASSWD_PATH: ${{ vars.APP_HTPASSWD_PATH }}
      APP_IMAGE: ${{ vars.APP_IMAGE }}
      VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Render deploy files
        run: |
          mkdir -p .deploy-rendered
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          export DEFAULT_APP_IMAGE="ghcr.io/$OWNER/rabbit-detector:latest"
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          defaults = {
              "APP_HOST_PORT": "8088",
              "APP_IMAGE": os.getenv("DEFAULT_APP_IMAGE", "ghcr.io/pollydrive/rabbit-detector:latest"),
              "VPS_APP_DIR": "/home/whl/rabbit-detector",
          }

          values = {key: os.getenv(key) or value for key, value in defaults.items()}
          values["APP_HTPASSWD_PATH"] = (
              os.getenv("APP_HTPASSWD_PATH")
              or f"{values['VPS_APP_DIR']}/deploy/secrets/.htpasswd"
          )
          templates = {
              "docker-compose.yml": ".deploy-rendered/docker-compose.yml",
          }

          pattern = re.compile(r"\$\{([A-Z0-9_]+)(?::-(.*?))?\}")

          def render(content: str) -> str:
              def replace(match: re.Match[str]) -> str:
                  key = match.group(1)
                  fallback = match.group(2)
                  return values.get(key) or fallback or ""

              return pattern.sub(replace, content)

          for source, target in templates.items():
              content = Path(source).read_text()
              rendered = render(content)
              Path(target).write_text(rendered)
          PY

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ vars.VPS_PORT || '22' }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: .deploy-rendered/docker-compose.yml
          target: ${{ vars.VPS_APP_DIR || '/home/whl/rabbit-detector' }}
          strip_components: 1

      - name: Pull and restart on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ vars.VPS_PORT || '22' }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_HTPASSWD_PATH,VPS_APP_DIR
          script: |
            APP_DIR="${VPS_APP_DIR:-/home/whl/rabbit-detector}"
            HTPASSWD_PATH="${APP_HTPASSWD_PATH:-$APP_DIR/deploy/secrets/.htpasswd}"
            mkdir -p "$APP_DIR"
            mkdir -p "$(dirname "$HTPASSWD_PATH")"
            docker compose -f "$APP_DIR/docker-compose.yml" pull
            docker compose -f "$APP_DIR/docker-compose.yml" up -d
