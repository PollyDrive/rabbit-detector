server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    auth_basic "Restricted Access to Rabbit Farm";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location = /healthz {
        access_log off;
        auth_basic off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
