services:
  rabbit-detector:
    container_name: rabbit-detector
    image: ${APP_IMAGE:-ghcr.io/pollydrive/rabbit-detector:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8088}:8080"
    environment:
      APP_AUTH_REALM: "Restricted Access to Rabbit Farm"
      APP_INTERNAL_SERVER_NAME: "_"
      APP_PORT: "8080"
    volumes:
      - ${APP_HTPASSWD_PATH:-./deploy/secrets/.htpasswd}:/etc/nginx/.htpasswd:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
